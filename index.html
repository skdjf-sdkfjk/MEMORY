<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<title>Memory Reconstruction</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
background:
radial-gradient(circle at center,#172554,#020617 60%);
font-family:'Segoe UI',sans-serif;
color:#dbeafe;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}


/* 홀로그램 빛 */

body:before{
content:"";
position:absolute;
width:600px;
height:600px;
border-radius:50%;
background:#38bdf8;
filter:blur(150px);
opacity:.15;
}



/* 메인 AR 공간 */

.ar{
width:850px;
height:600px;
position:relative;
}



/* 중앙 홀로그램 */

.holo{

position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);

width:330px;
height:330px;

border-radius:50%;

border:2px solid #38bdf8;

box-shadow:
0 0 40px #38bdf8,
inset 0 0 50px #38bdf8;

animation:rotate 8s linear infinite;

}



@keyframes rotate{

from{
transform:translate(-50%,-50%) rotate(0deg);
}

to{
transform:translate(-50%,-50%) rotate(360deg);
}

}



/* UI 패널 */

.panel{

position:absolute;

background:rgba(15,23,42,.65);

backdrop-filter:blur(15px);

border:1px solid rgba(56,189,248,.5);

border-radius:20px;

padding:25px;

box-shadow:0 0 30px rgba(56,189,248,.2);

}



.left{
left:0;
top:80px;
width:230px;
}


.right{
right:0;
top:120px;
width:230px;
}



.title{

position:absolute;
top:30px;
left:50%;
transform:translateX(-50%);

font-size:28px;
letter-spacing:4px;

}



.status{

color:#38bdf8;

}



button{

margin-top:20px;

padding:12px 30px;

border-radius:30px;

border:1px solid #38bdf8;

background:transparent;

color:#dbeafe;

cursor:pointer;

}



button:hover{

background:#38bdf8;

color:#020617;

}



.scan{

position:absolute;

bottom:50px;

left:50%;

transform:translateX(-50%);

width:350px;

height:6px;

background:#1e293b;

border-radius:10px;

overflow:hidden;

}



.progress{

height:100%;

width:0%;

background:#38bdf8;

}



#result{

display:none;

position:absolute;

inset:0;

background:rgba(2,6,23,.8);

backdrop-filter:blur(10px);

align-items:center;

justify-content:center;

flex-direction:column;

text-align:center;

}



.resultText{

font-size:40px;

color:#38bdf8;

animation:pulse 1.5s infinite;

}



@keyframes pulse{

50%{
opacity:.4;
}

}



</style>

</head>


<body>


<div class="ar">


<div class="title">
MEMORY RECONSTRUCTION SYSTEM
</div>



<div class="holo"></div>



<div class="panel left">

<h3>
NEURAL SCAN
</h3>


<p>
Connection
</p>

<p class="status">
● STABLE
</p>


<p>
Emotion Data
<br>
82%
</p>


<p>
Visual Data
<br>
91%
</p>


</div>





<div class="panel right">


<h3>
MEMORY DATA
</h3>


<p>
Fragment : 01</p>

<p>
Location :
UNKNOWN
</p>


<p>
Date :
HIDDEN
</p>


<button onclick="start()">

RECONSTRUCT

</button>


</div>





<div class="scan">

<div class="progress" id="progress">

</div>

</div>





<div id="result">


<div class="resultText">

MEMORY RESTORED

</div>


<br>


<p>

A memory has been recovered.

</p>


<p>

But this memory belongs to the future.

</p>


</div>



</div>





<script>


function start(){


let bar=document.getElementById("progress");

let value=0;


let timer=setInterval(()=>{


value+=2;


bar.style.width=value+"%";



if(value>=100){


clearInterval(timer);



setTimeout(()=>{


document.getElementById("result")
.style.display="flex";


},800);



}



},50);



}



</script>


</body>
</html>
