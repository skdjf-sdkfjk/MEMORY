<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>기억 복원 시스템. exe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Pretendard","Segoe UI",sans-serif;
}


body{

height:100vh;
overflow:hidden;

background:
radial-gradient(circle at center,#1e3a8a,#020617 70%);

color:white;

display:flex;
justify-content:center;
align-items:center;

}



/* 배경 입자 */

body::before{

content:"";

position:absolute;

width:100%;
height:100%;

background-image:
radial-gradient(#38bdf8 1px,transparent 1px);

background-size:40px 40px;

opacity:.15;

animation:move 15s linear infinite;

}



@keyframes move{

from{
transform:translateY(0);
}

to{
transform:translateY(40px);
}

}





.system{

width:950px;
height:620px;

position:relative;

}





.header{

position:absolute;

top:20px;
left:50%;

transform:translateX(-50%);

text-align:center;

letter-spacing:4px;

}



.header h1{

font-size:32px;

color:#7dd3fc;

}



.header p{

font-size:14px;

opacity:.7;

}





.panel{

position:absolute;

background:

rgba(15,23,42,.55);

border:

1px solid rgba(125,211,252,.4);

backdrop-filter:blur(20px);

border-radius:20px;

padding:25px;

box-shadow:

0 0 30px rgba(56,189,248,.2);

}



.left{

left:0;

top:160px;

width:270px;

}



.right{

right:0;

top:160px;

width:270px;

}





.panel h2{

font-size:18px;

color:#7dd3fc;

margin-bottom:20px;

}





.data{

margin:15px 0;

}



.bar{

height:8px;

background:#1e293b;

border-radius:20px;

overflow:hidden;

margin-top:7px;

}



.fill{

height:100%;

background:#38bdf8;

}





/* 홀로그램 */

.core{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:280px;
height:280px;

border-radius:50%;

border:2px solid #38bdf8;

box-shadow:

0 0 40px #38bdf8,

inset 0 0 40px #38bdf8;

animation:spin 8s linear infinite;

}



.core::after{

content:"";

position:absolute;

width:180px;
height:180px;

left:50%;
top:50%;

transform:translate(-50%,-50%);

border-radius:50%;

border:1px solid #a5f3fc;

}



@keyframes spin{

100%{

transform:translate(-50%,-50%) rotate(360deg);

}

}





.scan{

position:absolute;

left:50%;
bottom:100px;

transform:translateX(-50%);

width:300px;

height:4px;

background:#0f172a;

}



.scan div{

height:100%;

width:0%;

background:#38bdf8;

}




button{

margin-top:20px;

width:100%;

padding:14px;

border-radius:30px;

background:transparent;

border:1px solid #38bdf8;

color:white;

cursor:pointer;

}



button:hover{

background:#38bdf8;

color:#020617;

}





#complete{

display:none;

position:absolute;

inset:0;

background:rgba(2,6,23,.85);

backdrop-filter:blur(15px);

align-items:center;

justify-content:center;

flex-direction:column;

text-align:center;

}



#complete h1{

font-size:45px;

color:#7dd3fc;

animation:pulse 1s infinite;

}



@keyframes pulse{

50%{

opacity:.5;

}

}



</style>

</head>


<body>


<div class="system">


<div class="header">

<h1>
MEMORY RECONSTRUCTION
</h1>

<p>
AI 기억 복원 연구 시스템 / VERSION 2026
</p>

</div>




<div class="panel left">


<h2>
🧬 대상 분석
</h2>


<div class="data">

시각 기억

<div class="bar">
<div class="fill" style="width:92%"></div>
</div>

</div>



<div class="data">

감정 데이터

<div class="bar">
<div class="fill" style="width:76%"></div>
</div>

</div>



<div class="data">

음성 기록

<div class="bar">
<div class="fill" style="width:88%"></div>
</div>

</div>


</div>





<div class="core"></div>





<div class="panel right">


<h2>
📡 기억 정보
</h2>


<p>
상태 : 분석 완료
</p>

<br>

<p>
기억 조각 : 01
</p>

<p>
발견 위치 : 미확인
</p>

<p>
시간 정보 : 삭제됨
</p>



<button onclick="restore()">

기억 복원 시작

</button>



</div>




<div class="scan">

<div id="progress"></div>

</div>




<div id="complete">


<h1>
복원 완료
</h1>


<br>

<p>
삭제된 기억 데이터가 복구되었습니다.
</p>


<br>

<p>
하지만 이상한 점이 발견되었습니다.
</p>


<br>

<h2>
"이 기억은 아직 일어나지 않은 미래입니다."
</h2>


</div>




</div>




<script>


function restore(){


let bar=document.getElementById("progress");

let value=0;


let timer=setInterval(()=>{


value+=2;

bar.style.width=value+"%";


if(value>=100){


clearInterval(timer);


setTimeout(()=>{


document.getElementById("complete")
.style.display="flex";


},1000);


}


},40);



}


</script>


</body>
</html>
